<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | John Kihiu</title>
<meta name="robots" content="noindex">
<link rel="canonical" href="https://kihiujohn.github.io/">
<link rel="icon" type="image/svg+xml" href="/logos/favicon-portfolio.svg">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Courier New', monospace; }
  .neobrutalist-btn { border: 3px solid #000; box-shadow: 4px 4px 0 #000; transition: all 0.2s; }
  .neobrutalist-btn:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #000; }
  .text-secondary { color: #4ade80; }
  .bg-secondary { background-color: #4ade80; }
</style>
</head>
<body class="bg-white text-black min-h-screen flex items-center justify-center p-6">
  <div class="text-center max-w-xl">
    <div class="text-8xl md:text-9xl font-bold mb-4"><span class="text-secondary">4</span>0<span class="text-secondary">4</span></div>
    <h1 class="text-2xl md:text-3xl font-bold mb-4">Page not found</h1>
    <p class="text-gray-600 mb-8">The page you're looking for doesn't exist, was moved, or may have been renamed. If you arrived here from a bookmarked link, check the blog for the latest articles.</p>
    <div class="flex flex-wrap gap-4 justify-center">
      <a href="/" class="neobrutalist-btn bg-secondary hover:bg-green-500 text-black font-bold py-3 px-6">Back to Home</a>
      <a href="/blog/" class="neobrutalist-btn bg-white text-black font-bold py-3 px-6">Browse Blog</a>
    </div>
  </div>
<script>
(function(){
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && ['u','U','s','S','i','I'].includes(e.key)) e.preventDefault();
    if (e.key === 'F12') e.preventDefault();
    if (e.ctrlKey && e.shiftKey && ['i','I','j','J','c','C'].includes(e.key)) e.preventDefault();
  });
})();
</script>
</body>
</html>
