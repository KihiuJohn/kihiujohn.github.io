<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blog | John Kihiu</title>
<link rel="canonical" href="https://kihiujohn.github.io/blog/">
<meta http-equiv="refresh" content="0; url=/blog/">
<meta name="robots" content="noindex">
<script>window.location.replace('/blog/');</script>
</head>
<body><p>Redirecting to <a href="/blog/">/blog/</a>...</p><script>
(function(){
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('keydown', e => {
    if (e.ctrlKey && ['u','U','s','S','i','I'].includes(e.key)) e.preventDefault();
    if (e.key === 'F12') e.preventDefault();
    if (e.ctrlKey && e.shiftKey && ['i','I','j','J','c','C'].includes(e.key)) e.preventDefault();
  });
})();
</script>
</body>
</html>
