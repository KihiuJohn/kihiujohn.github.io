    <style>
        .neobrutalist { border: 3px solid #000; box-shadow: 8px 8px 0 #000; }
        .neobrutalist-btn { border: 3px solid #000; box-shadow: 4px 4px 0 #000; transition: all 0.2s; }

        .mobile-menu { display: none; position: fixed; top: 80px; right: 20px; background: white; border: 3px solid black; box-shadow: 8px 8px 0 #000; z-index: 20; }
        .mobile-menu.active { display: block; }
        .glassmorphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 2px solid #000; }
        .text-secondary { color: #4ade80; }

        .hover\:bg-secondary:hover { background-color: #4ade80; }

    <script>
        tailwind.config = {
            theme: {

                    colors: { primary: '#FFFFFF', secondary: '#4ade80' },

            }
        }

</head>
<body class="bg-white text-black font-sans">
    <nav class="bg-white border-b-4 border-black fixed w-full z-10">
        <div class="container mx-auto px-6 py-3">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-2xl font-bold text-black hover:text-secondary transition">John<span class="text-secondary">Kihiu</span></a>
                <div class="hidden md:flex space-x-8">
                    <a href="index.html#home" class="hover:text-secondary transition">Home</a>
                    <a href="index.html#about" class="hover:text-secondary transition">About</a>
                    <a href="index.html#skills" class="hover:text-secondary transition">Skills</a>
                    <a href="blogs.html" class="text-secondary">Blog</a>
                    <a href="index.html#contact" class="hover:text-secondary transition">Contact</a>
                </div>
                <button id="menuButton" class="md:hidden focus:outline-none"><i data-feather="menu"></i></button>
                <div id="mobileMenu" class="mobile-menu p-4">
                    <div class="flex flex-col space-y-4">
                        <a href="index.html#home" class="hover:text-secondary transition">Home</a>
                        <a href="index.html#about" class="hover:text-secondary transition">About</a>
                        <a href="index.html#skills" class="hover:text-secondary transition">Skills</a>
                        <a href="blogs.html" class="hover:text-secondary transition">Blog</a>
                        <a href="index.html#contact" class="hover:text-secondary transition">Contact</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-6 pt-24 pb-12">
        <h1 class="text-4xl font-bold mb-4 text-center">Technical <span class="text-secondary">Blog</span></h1>
        <p class="text-center text-gray-600 mb-8 max-w-2xl mx-auto">Learn about Acumatica ERP development, customization, API integrations, report designer, workflows, and Laravel backend development.</p>
        
        <div class="mb-8">
            <div class="flex flex-wrap justify-center gap-2">
                <button class="category-btn active px-4 py-2 border-2 border-black rounded-lg hover:bg-secondary transition" data-category="all">All</button>
                <button class="category-btn px-4 py-2 border-2 border-black rounded-lg hover:bg-secondary transition" data-category="acumatica">Acumatica</button>
                <button class="category-btn px-4 py-2 border-2 border-black rounded-lg hover:bg-secondary transition" data-category="laravel">Laravel</button>
                <button class="category-btn px-4 py-2 border-2 border-black rounded-lg hover:bg-secondary transition" data-category="integration">Integrations</button>
                <button class="category-btn px-4 py-2 border-2 border-black rounded-lg hover:bg-secondary transition" data-category="erp">ERP Systems</button>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="blogGrid">
        </div>
        
        <div class="text-center mt-12" id="pagination"></div>
    </div>

    <footer class="bg-white border-t-4 border-black py-8">
        <div class="container mx-auto px-6 text-center">
            <div class="text-2xl font-bold text-black mb-4">John<span class="text-secondary">Kihiu</span></div>
            <p>&copy; 2023 John Kihiu. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const blogPosts = [
            { title: "Complete Guide to Acumatica REST API Integration", category: "acumatica", excerpt: "Learn how to integrate Acumatica with external systems using REST API...", url: "blog/complete-guide-acumatica-rest-api-integration.html", date: "2024-01-15" },
            { title: "How to Build Custom Screens in Acumatica", category: "acumatica", excerpt: "Step-by-step guide to creating custom screens in Acumatica ERP...", url: "blog/how-to-build-custom-screens-acumatica.html", date: "2024-01-14" },
            { title: "Building Enterprise APIs with Laravel", category: "laravel", excerpt: "Master Laravel API development for enterprise applications...", url: "blog/building-enterprise-apis-laravel.html", date: "2024-01-13" },
            { title: "Mastering Acumatica Report Designer", category: "acumatica", excerpt: "Create powerful reports with Acumatica Report Designer...", url: "blog/mastering-acumatica-report-designer.html", date: "2024-01-12" },
            { title: "Understanding Acumatica Generic Inquiries", category: "acumatica", excerpt: "Learn how to build custom queries and analytics...", url: "blog/understanding-acumatica-generic-inquiries.html", date: "2024-01-11" },
            { title: "Automating Business Processes with Acumatica Workflows", category: "acumatica", excerpt: "Streamline your business with workflow automation...", url: "blog/automating-business-processes-acumatica-workflows.html", date: "2024-01-10" },
            { title: "Laravel REST API Development Best Practices", category: "laravel", excerpt: "Build robust and scalable REST APIs with Laravel...", url: "blog/laravel-rest-api-development.html", date: "2024-01-09" },
            { title: "Acumatica DAC Extensions Best Practices", category: "acumatica", excerpt: "Extend Acumatica data entities with DAC extensions...", url: "blog/acumatica-dac-extensions-best-practices.html", date: "2024-01-08" },
            { title: "Deploying Laravel Applications to Azure", category: "laravel", excerpt: "Step-by-step guide to deploying Laravel on Azure...", url: "blog/deploying-laravel-azure.html", date: "2024-01-07" },
            { title: "Acumatica Cloud Deployment Guide", category: "acumatica", excerpt: "Deploy and manage Acumatica in the cloud...", url: "blog/acumatica-cloud-deployment-guide.html", date: "2024-01-06" },
            { title: "Laravel Unit Testing Best Practices", category: "laravel", excerpt: "Write effective unit tests for Laravel applications...", url: "blog/laravel-unit-testing-best-practices.html", date: "2024-01-05" },
            { title: "Acumatica SQL Analysis Tools", category: "acumatica", excerpt: "Use SQL tools for Acumatica data analysis...", url: "blog/acumatica-sql-analysis-tools.html", date: "2024-01-04" }
        ];

        const itemsPerPage = 9;
        let currentPage = 1;
        let currentCategory = 'all';

        function renderPosts() {
            const filtered = currentCategory === 'all' ? blogPosts : blogPosts.filter(p => p.category === currentCategory);
            const start = (currentPage - 1) * itemsPerPage;
            const paginated = filtered.slice(start, start + itemsPerPage);
            
            const grid = document.getElementById('blogGrid');
            grid.innerHTML = paginated.map(post => `
                <article class="glassmorphism rounded-lg overflow-hidden transition duration-300 hover:-translate-y-2">
                    <div class="p-6">
                        <span class="text-xs text-secondary font-bold uppercase">${post.category}</span>
                        <h3 class="font-bold text-xl mb-2 mt-2">${post.title}</h3>
                        <p class="text-gray-600 mb-4 text-sm">${post.excerpt}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-xs text-gray-500">${post.date}</span>
                            <a href="${post.url}" class="text-secondary font-semibold hover:underline">Read More</a>
                        </div>
                    </div>
                </article>
            `).join('');

            renderPagination(filtered.length);
        }

        function renderPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            for (let i = 1; i <= totalPages; i++) {
                html += `<button class="px-4 py-2 border-2 border-black rounded-lg mx-1 ${i === currentPage ? 'bg-secondary' : 'bg-white hover:bg-secondary'} transition" onclick="goToPage(${i})">${i}</button>`;
            }
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderPosts();
            window.scrollTo({ top: 300, behavior: 'smooth' });
        }

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                currentPage = 1;
                renderPosts();
            });
        });

        feather.replace();
        renderPosts();

        // Mobile menu
        const menuButton = document.getElementById('menuButton');
        const mobileMenu = document.getElementById('mobileMenu');
        menuButton.addEventListener('click', () => mobileMenu.classList.toggle('active'));
        document.addEventListener('click', (e) => {
            if (!menuButton.contains(e.target) && !mobileMenu.contains(e.target)) {
                mobileMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
